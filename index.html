<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pscotcarl — research portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #161616;
    --surface:  #1f1f1f;
    --surface2: #272727;
    --border:   #2c2c2c;
    --border2:  #383838;
    --text:     #e0e0e0;
    --text-2:   #919191;
    --text-3:   #4a4a4a;
    --accent:   #c4a35a;
    --red:      #b85c5c;
    --green:    #5e9e80;
    --blue:     #5585aa;
    --neutral:  #777777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  .page {
    max-width: 820px;
    margin: 0 auto;
    padding: 5rem 2rem 7rem;
  }

  .eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.1rem;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.0;
    color: var(--text);
    margin-bottom: 1.6rem;
  }

  .bio {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--text-2);
    line-height: 1.8;
    max-width: 480px;
    margin-bottom: 3.5rem;
  }

  .bio strong { color: var(--text); font-weight: 500; }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  .projects {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 5rem;
  }

  .project-card {
    background: var(--surface);
    padding: 1.6rem 1.8rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1.5rem;
    align-items: start;
    transition: background 0.12s;
    border-left: 2px solid transparent;
    cursor: pointer;
  }

  a.project-card:hover {
    background: var(--surface2);
    border-left-color: var(--accent);
  }

  .card-left { display: flex; flex-direction: column; gap: 0.55rem; }

  .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .tag {
    font-family: 'Syne', sans-serif;
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border: 1px solid;
    border-radius: 2px;
  }

  .tag-fx      { color: #c4a35a; border-color: #c4a35a40; }
  .tag-macro   { color: #5585aa; border-color: #5585aa40; }
  .tag-rates   { color: #8a7ab5; border-color: #8a7ab540; }
  .tag-eu      { color: #5e9e80; border-color: #5e9e8040; }
  .tag-data    { color: #919191; border-color: #91919140; }
  .tag-equity  { color: #b85c5c; border-color: #b85c5c40; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .card-subtitle {
    font-size: 0.78rem;
    color: var(--text-2);
    font-weight: 300;
  }

  .card-desc {
    font-size: 0.8rem;
    color: var(--text-2);
    line-height: 1.7;
    font-weight: 300;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    margin-top: 0.1rem;
    max-width: 500px;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.9rem;
    padding-top: 0.1rem;
  }

  .rec {
    font-family: 'Syne', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border: 1px solid;
    white-space: nowrap;
    border-radius: 2px;
  }

  .rec-short       { color: var(--red);     border-color: var(--red);     }
  .rec-long        { color: var(--green);   border-color: var(--green);   }
  .rec-exploratory { color: var(--neutral); border-color: var(--neutral); }
  .rec-neutral     { color: var(--neutral); border-color: var(--neutral); }

  .card-arrow {
    font-size: 1rem;
    color: var(--text-3);
    transition: color 0.12s, transform 0.12s;
  }

  a.project-card:hover .card-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  .card-updated {
    font-size: 0.62rem;
    color: var(--text-3);
    font-weight: 300;
  }

  .skeleton {
    background: var(--surface);
    padding: 1.6rem 1.8rem;
    border-left: 2px solid transparent;
  }

  .skeleton-line {
    height: 11px;
    background: var(--border2);
    border-radius: 2px;
    margin-bottom: 0.7rem;
    animation: shimmer 1.4s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%,100% { opacity: 0.35; }
    50%      { opacity: 0.8; }
  }

  .error-note {
    font-size: 0.8rem;
    color: var(--text-3);
    padding: 1.4rem 1.8rem;
    background: var(--surface);
    border-left: 2px solid var(--border2);
  }

  footer {
    border-top: 1px solid var(--border);
    padding-top: 2rem;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
    font-size: 0.68rem;
    color: var(--text-3);
    font-weight: 300;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }

  @media (max-width: 600px) {
    .page { padding: 3rem 1.4rem 5rem; }
    .project-card { grid-template-columns: 1fr; }
    .card-right { flex-direction: row; align-items: center; }
    .card-arrow { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <p class="eyebrow">Research Portfolio</p>
    <h1 class="name">pscotcarl</h1>
    <p class="bio">
      Applied economics master's student with a background in data analytics.
      I build <strong>interactive research dashboards</strong> that combine macro
      fundamentals, market data, and visualization — focused on FX, rates, and
      cross-asset themes.
    </p>
  </header>

  <p class="section-label">Dashboards</p>
  <div class="projects" id="projects">
    <div class="skeleton">
      <div class="skeleton-line" style="width:14%; margin-bottom:1rem;"></div>
      <div class="skeleton-line" style="width:52%;"></div>
      <div class="skeleton-line" style="width:34%;"></div>
      <div class="skeleton-line" style="width:88%; margin-top:0.9rem;"></div>
    </div>
    <div class="skeleton">
      <div class="skeleton-line" style="width:14%; margin-bottom:1rem;"></div>
      <div class="skeleton-line" style="width:48%;"></div>
      <div class="skeleton-line" style="width:30%;"></div>
      <div class="skeleton-line" style="width:80%; margin-top:0.9rem;"></div>
    </div>
  </div>

  <footer>
    <span>pscotcarl.github.io/portfolio</span>
    <span id="footer-date"></span>
  </footer>

</div>
<script>
  const GITHUB_USER = 'pscotcarl';
  const GITHUB_REPO = 'portfolio';
  const SKIP = new Set(['.github', 'assets', 'public', '.git']);

  const TAG_CLASS = {
    FX: 'tag-fx', Macro: 'tag-macro', Rates: 'tag-rates',
    EU: 'tag-eu', Data: 'tag-data', Equity: 'tag-equity', Labor: 'tag-data'
  };

  const REC_CLASS = {
    SHORT: 'rec-short', LONG: 'rec-long',
    EXPLORATORY: 'rec-exploratory', NEUTRAL: 'rec-neutral'
  };

  async function getFolders() {
    const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`, {
      headers: { Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('GitHub API error');
    const items = await r.json();
    return items.filter(i => i.type === 'dir' && !SKIP.has(i.name)).map(i => i.name);
  }

  async function getMeta(folder) {
    try {
      const r = await fetch(
        `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${folder}/project.json`
      );
      return r.ok ? r.json() : null;
    } catch { return null; }
  }

  function buildCard(folder, meta) {
    const recKey = (meta.recommendation || '').toUpperCase();
    const recCls = REC_CLASS[recKey] || 'rec-neutral';
    const tags = (meta.tags || []).map(t =>
      `<span class="tag ${TAG_CLASS[t] || 'tag-data'}">${t}</span>`
    ).join('');

    const el = document.createElement('a');
    el.className = 'project-card';
    el.href = `./${folder}/`;
    el.innerHTML = `
      <div class="card-left">
        <div class="card-tags">${tags}</div>
        <div class="card-title">${meta.title || folder}</div>
        <div class="card-subtitle">${meta.subtitle || ''}</div>
        ${meta.description ? `<div class="card-desc">${meta.description}</div>` : ''}
      </div>
      <div class="card-right">
        ${meta.rec_label ? `<span class="rec ${recCls}">${meta.rec_label}</span>` : ''}
        <span class="card-updated">${meta.updated || ''}</span>
        <span class="card-arrow">&#8594;</span>
      </div>`;
    return el;
  }

  function buildFallback(folder) {
    const el = document.createElement('a');
    el.className = 'project-card';
    el.href = `./${folder}/`;
    el.innerHTML = `
      <div class="card-left">
        <div class="card-title" style="text-transform:capitalize">${folder}</div>
        <div class="card-subtitle" style="color:var(--text-3);font-size:0.72rem">
          Add a project.json to show details here.
        </div>
      </div>
      <div class="card-right"><span class="card-arrow">&#8594;</span></div>`;
    return el;
  }

  async function init() {
    const container = document.getElementById('projects');
    try {
      const folders = await getFolders();
      if (!folders.length) {
        container.innerHTML = '<div class="error-note">No project folders found.</div>';
        return;
      }
      const metas = await Promise.all(folders.map(getMeta));
      const projects = folders
        .map((f, i) => ({ folder: f, meta: metas[i] }))
        .sort((a, b) => (a.meta?.order ?? 999) - (b.meta?.order ?? 999));

      container.innerHTML = '';
      projects.forEach(({ folder, meta }) => {
        container.appendChild(meta ? buildCard(folder, meta) : buildFallback(folder));
      });
    } catch (e) {
      console.error(e);
      container.innerHTML = `<div class="error-note">
        Could not load from GitHub API. If viewing locally, serve via a dev server.
      </div>`;
    }
  }

  document.getElementById('footer-date').textContent =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  init();
</script>
</body>
</html>
